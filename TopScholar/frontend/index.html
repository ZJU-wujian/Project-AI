<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TopScholar - 学术社交与论文发现</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #ffffff; color: #1a1a1a; min-height: 100vh; }
    
    /* Header */
    .header { position: fixed; top: 0; left: 0; right: 0; background: rgba(255,255,255,0.85); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0,0,0,0.05); z-index: 1000; }
    .header-content { max-width: 1400px; margin: 0 auto; padding: 0 2rem; height: 72px; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-size: 22px; font-weight: 700; color: #0f172a; letter-spacing: -0.5px; cursor: pointer; display: flex; align-items: center; }
    .logo span { color: #3b82f6; }
    .nav-links { display: flex; gap: 2rem; }
    .nav-links a { color: #64748b; font-size: 15px; font-weight: 500; text-decoration: none; transition: color 0.2s; cursor: pointer; }
    .nav-links a:hover, .nav-links a.active { color: #0f172a; }
    .auth-buttons { display: flex; gap: 1rem; align-items: center; }
    .btn-login { padding: 10px 20px; color: #475569; font-size: 14px; font-weight: 500; background: transparent; border: none; cursor: pointer; border-radius: 8px; transition: background 0.2s; }
    .btn-login:hover { background: #f1f5f9; }
    .btn-register { padding: 10px 24px; background: #0f172a; color: white; font-size: 14px; font-weight: 600; border: none; border-radius: 8px; cursor: pointer; transition: opacity 0.2s; }
    .btn-register:hover { opacity: 0.9; }
    
    /* Hero */
    .hero { padding: 120px 2rem 80px; text-align: center; }
    .hero h1 { font-size: 48px; font-weight: 800; color: #0f172a; margin-bottom: 1.5rem; line-height: 1.1; letter-spacing: -1px; }
    .hero p { font-size: 1.25rem; color: #64748b; max-width: 600px; margin: 0 auto 2.5rem; line-height: 1.7; }
    .hero-buttons { display: flex; gap: 16px; justify-content: center; }
    .btn-primary { padding: 14px 32px; background: #0f172a; color: white; font-size: 16px; font-weight: 600; border: none; border-radius: 12px; cursor: pointer; transition: all 0.2s; }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-secondary { padding: 14px 32px; background: white; color: #0f172a; font-size: 16px; font-weight: 600; border: 1px solid #e2e8f0; border-radius: 12px; cursor: pointer; transition: all 0.2s; }
    .btn-secondary:hover { background: #f8fafc; }
    .search-box { display: flex; align-items: center; max-width: 600px; margin: 0 auto 3rem; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 16px; padding: 4px 16px; transition: all 0.2s; }
    .search-box:focus-within { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
    .search-icon { color: #94a3b8; font-size: 18px; margin-right: 12px; }
    .search-input { flex: 1; border: none; background: transparent; padding: 14px 0; font-size: 16px; color: #0f172a; outline: none; }
    .search-input::placeholder { color: #94a3b8; }
    .hero-stats { display: flex; justify-content: center; gap: 4rem; margin-top: 4rem; }
    .hero-stats .stat { text-align: center; }
    .hero-stats .stat-value { font-size: 36px; font-weight: 800; color: #0f172a; }
    .hero-stats .stat-label { font-size: 14px; color: #64748b; margin-top: 4px; }

    /* Main Content */
    .main-content { max-width: 1400px; margin: 0 auto; padding: 3rem 2rem; }
    .page { display: none; animation: fadeIn 0.4s ease-out; }
    .page.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2.5rem; }
    .section-header h2 { font-size: 24px; font-weight: 700; color: #0f172a; }
    .section-link { color: #3b82f6; font-size: 14px; font-weight: 500; text-decoration: none; }
    .paper-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 24px; }

    /* Paper Card */
    .paper-card { background: white; border: 1px solid #e2e8f0; border-radius: 16px; padding: 28px; transition: all 0.3s; cursor: pointer; }
    .paper-card:hover { border-color: #cbd5e1; box-shadow: 0 10px 40px rgba(0,0,0,0.05); transform: translateY(-2px); }
    .card-header { display: flex; gap: 12px; align-items: center; margin-bottom: 16px; }
    .journal-dot { width: 12px; height: 12px; border-radius: 50%; }
    .dot-nature { background: #3b82f6; }
    .dot-science { background: #8b5cf6; }
    .dot-cell { background: #ec4899; }
    .journal-name { font-size: 13px; font-weight: 600; color: #64748b; }
    .paper-card h3 { font-size: 18px; font-weight: 600; color: #0f172a; line-height: 1.5; margin-bottom: 12px; }
    .paper-card p { color: #64748b; font-size: 14px; line-height: 1.6; margin-bottom: 16px; }
    .paper-card p.author { color: #94a3b8; font-size: 13px; margin-bottom: 20px; }
    .card-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 16px; border-top: 1px solid #f1f5f9; }
    .citation-badge { display: flex; align-items: center; gap: 4px; color: #94a3b8; font-size: 13px; }
    .btn-read { background: #0f172a; color: white; border: none; padding: 8px 20px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
    .btn-read:hover { opacity: 0.9; }
    .paper-meta { display: flex; justify-content: space-between; align-items: center; padding-top: 16px; border-top: 1px solid #f1f5f9; }
    .paper-authors { color: #94a3b8; font-size: 13px; }
    .citation-count { display: flex; align-items: center; gap: 4px; color: #94a3b8; font-size: 13px; }
    .like-btn { background: transparent; border: none; font-size: 14px; cursor: pointer; color: #94a3b8; transition: color 0.2s; }
    .like-btn:hover { color: #ef4444; }

    /* Detail Page */
    .paper-detail { background: white; border: 1px solid #e2e8f0; border-radius: 24px; padding: 48px; margin-bottom: 24px; }
    .paper-detail h1 { font-size: 32px; font-weight: 800; color: #0f172a; margin-bottom: 24px; line-height: 1.3; }
    .paper-detail .abstract { color: #475569; font-size: 1.125rem; line-height: 1.8; margin-bottom: 32px; }
    .btn-read-detail { background: #0f172a; color: white; border: none; padding: 14px 32px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; }
    .btn-read-detail:hover { opacity: 0.9; transform: translateY(-1px); }
    .back-link { color: #64748b; cursor: pointer; margin-bottom: 24px; display: inline-flex; align-items: center; gap: 6px; font-size: 14px; transition: color 0.2s; }
    .back-link:hover { color: #0f172a; }

    /* Social Feed */
    .feed-item { background: white; border: 1px solid #e2e8f0; border-radius: 16px; padding: 24px; margin-bottom: 20px; transition: all 0.3s; }
    .feed-item:hover { border-color: #cbd5e1; box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
    .feed-user { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .user-avatar { width: 40px; height: 40px; background: #f1f5f9; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; color: #475569; }
    .feed-content { margin-bottom: 16px; line-height: 1.7; color: #334155; font-size: 15px; }
    .feed-paper-card { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 16px; margin-top: 12px; cursor: pointer; transition: all 0.2s; }
    .feed-paper-card:hover { background: #f1f5f9; }

    /* Profile Page */
    .profile-header { background: white; border: 1px solid #e2e8f0; border-radius: 24px; padding: 48px; margin-bottom: 32px; display: flex; align-items: center; gap: 40px; }
    .profile-avatar { width: 120px; height: 120px; background: #0f172a; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 48px; font-weight: bold; }
    .profile-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-bottom: 32px; }
    .stat-card { background: white; border: 1px solid #e2e8f0; border-radius: 16px; padding: 24px; text-align: center; transition: all 0.3s; }
    .stat-card:hover { border-color: #cbd5e1; box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
    .stat-value { font-size: 28px; font-weight: 700; color: #0f172a; }
    .stat-label { font-size: 14px; color: #64748b; margin-top: 4px; }

    /* Forms */
    .login-page, .register-page { max-width: 440px; margin: 6rem auto; background: white; border: 1px solid #e2e8f0; border-radius: 24px; padding: 48px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); }
    .form-group { margin-bottom: 24px; }
    .form-group label { display: block; margin-bottom: 8px; color: #475569; font-size: 14px; font-weight: 500; }
    .form-group input { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; background: #f8fafc; transition: all 0.2s; }
    .form-group input:focus { outline: none; border-color: #3b82f6; background: white; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
    .btn-submit { width: 100%; padding: 14px; background: #0f172a; color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-submit:hover { opacity: 0.9; transform: translateY(-1px); }

    /* Citation Graph */
    .citation-section { background: white; border: 1px solid #e2e8f0; border-radius: 24px; padding: 32px; margin: 32px 0; }
    .citation-section svg { width: 100%; height: 400px; border: 1px solid #f1f5f9; border-radius: 16px; }
    .citation-link { stroke: #e2e8f0; stroke-width: 1.5; }
    .citation-node { cursor: pointer; transition: r 0.2s; }
    .citation-label { font-size: 11px; fill: #64748b; pointer-events: none; text-anchor: middle; }
    
    .spinner { width: 40px; height: 40px; border: 3px solid #f1f5f9; border-top-color: #0f172a; border-radius: 50%; animation: spin 1s linear infinite; margin: 4rem auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-content">
      <div class="logo" onclick="app.navigate('home')">Top<span>Scholar</span></div>
      <nav class="nav-links">
          <a onclick="app.navigate('home')" class="active">首页</a>
          <a onclick="app.navigate('papers')">论文</a>
          <a onclick="app.navigate('explore')">发现</a>
          <a onclick="app.navigate('feed')" id="nav-feed">动态</a>
          <a onclick="app.navigate('friends')" id="nav-friends">好友</a>
          <a onclick="app.navigate('bookmarks')" id="nav-bookmarks">收藏</a>
          <a onclick="app.navigate('profile')" id="nav-profile">我的</a>
        </nav>
      <div class="auth-buttons" id="auth-buttons">
        <button class="btn-login" onclick="app.navigate('login')">登录</button>
        <button class="btn-register" onclick="app.navigate('register')">注册</button>
      </div>
      <div class="user-info" id="user-info" style="display:none; align-items: center; gap: 12px;">
        <span id="user-name" style="font-weight: 500; color: #0f172a;"></span>
        <button class="btn-login" onclick="app.logout()">退出</button>
      </div>
    </div>
  </header>

  <main>
    <!-- Home Page -->
    <div id="page-home" class="page active">
      <section class="hero">
        <h1>探索学术前沿，连接科研社群</h1>
        <p>发现最新论文，追踪科研动态，与全球学者交流</p>
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" class="search-input" placeholder="搜索论文标题、作者或关键词..." onkeypress="if(event.key === 'Enter') app.navigate('explore')">
        </div>
        <div class="hero-stats">
          <div class="stat"><div class="stat-value">50K+</div><div class="stat-label">收录论文</div></div>
          <div class="stat"><div class="stat-value">10K+</div><div class="stat-label">活跃用户</div></div>
          <div class="stat"><div class="stat-value">100+</div><div class="stat-label">合作期刊</div></div>
        </div>
      </section>
      <div class="main-content">
        <div class="section-header">
          <h2>最新论文</h2>
          <span id="home-count">加载中...</span>
        </div>
        <div class="paper-grid" id="homeGrid"></div>
      </div>
    </div>

    <!-- Papers Page -->
    <div id="page-papers" class="page">
      <div class="main-content">
        <div class="section-header">
          <h2>所有论文</h2>
          <button class="btn-login" onclick="app.goBack()">返回</button>
        </div>
        <div class="paper-grid" id="papersGrid"></div>
      </div>
    </div>

    <!-- Paper Detail Page -->
    <div id="page-paper-detail" class="page">
      <div class="main-content">
        <div class="back-link" onclick="app.goBack()">← 返回</div>
        <div id="paperDetail"></div>
      </div>
    </div>

    <!-- Explore Page -->
    <div id="page-explore" class="page">
      <div class="main-content">
        <div class="section-header"><h2>发现</h2></div>
        <div style="display:flex; gap:12px; max-width:600px; margin-bottom:2rem;">
          <input type="text" id="search-input" placeholder="搜索论文..." style="flex:1;padding:12px;border:1px solid #d1d5db;border-radius:8px;">
          <button class="btn-read" onclick="app.searchPapers()">搜索</button>
        </div>
        <div class="section-header"><h3>热门推荐</h3></div>
        <div class="paper-grid" id="trendingGrid"></div>
        <div id="search-results" style="display:none; margin-top:2rem;">
          <div class="section-header"><h3>搜索结果</h3></div>
          <div class="paper-grid" id="searchGrid"></div>
        </div>
      </div>
    </div>

    <!-- Social Feed Page -->
    <div id="page-feed" class="page">
      <div class="main-content">
        <div class="section-header">
          <h2>学术动态</h2>
          ${token ? `<button class="btn-read" onclick="app.showPostModal()">发布心得</button>` : ''}
        </div>
        <div id="feed-container"></div>
      </div>
    </div>

    <!-- Post Modal -->
    <div id="post-modal" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); z-index:2000; justify-content:center; align-items:center;">
      <div style="background:white; border-radius:24px; padding:32px; width:90%; max-width:500px;">
        <h3>发布阅读心得</h3>
        <div class="form-group"><label>关联论文 ID（可选）</label><input type="number" id="post-paper-id" placeholder="输入论文ID"></div>
        <div class="form-group"><label>心得内容</label><textarea id="post-content" rows="4" style="width:100%;padding:12px;border:1px solid #e2e8f0;border-radius:10px;background:#f8fafc;" placeholder="分享你的阅读心得..."></textarea></div>
        <div style="display:flex; gap:12px; justify-content:flex-end; margin-top:24px;">
          <button class="btn-login" onclick="app.hidePostModal()">取消</button>
          <button class="btn-submit" onclick="app.createPost()">发布</button>
        </div>
      </div>
    </div>

    <!-- Profile Page -->
    <div id="page-profile" class="page">
      <div class="main-content">
        <div id="profile-header"></div>
        <div class="profile-stats" id="profile-stats"></div>
        <div style="display:flex; gap:12px;">
          <button class="btn-read" onclick="app.navigate('bookmarks')">我的收藏</button>
          <button class="btn-login" onclick="app.toggleHistoryVisibility()">切换历史可见性</button>
        </div>
      </div>
    </div>

    <!-- Bookmarks Page -->
    <div id="page-bookmarks" class="page">
      <div class="main-content">
        <div class="section-header"><h2>我的收藏</h2></div>
        <div class="paper-grid" id="bookmarksGrid"></div>
      </div>
    </div>

    <!-- Friends Page -->
    <div id="page-friends" class="page">
      <div class="main-content">
        <div class="section-header">
          <h2>好友动态</h2>
          <button class="btn-read" onclick="app.navigate('add-friend')">添加好友</button>
        </div>
        <div id="friends-history"></div>
      </div>
    </div>

    <!-- Add Friend Page -->
    <div id="page-add-friend" class="page">
      <div class="main-content">
        <div class="section-header"><h2>添加好友</h2></div>
        <div style="display:flex; gap:12px; max-width:600px; margin-bottom:2rem;">
          <input type="text" id="friend-search" placeholder="搜索用户名或邮箱..." style="flex:1;padding:12px;border:1px solid #d1d5db;border-radius:8px;">
          <button class="btn-read" onclick="app.searchFriends()">搜索</button>
        </div>
        <div id="friend-search-results"></div>
        <div class="section-header"><h3>待处理请求</h3></div>
        <div id="pending-requests"></div>
      </div>
    </div>

    <!-- Auth Pages -->
    <div id="page-login" class="page">
      <div class="login-page">
        <h2>登录</h2>
        <div class="form-group"><label>邮箱或用户名</label><input type="text" id="login-email"></div>
        <div class="form-group"><label>密码</label><input type="password" id="login-password"></div>
        <button class="btn-submit" onclick="app.handleLogin()">登录</button>
        <div class="form-footer">没有账号？ <a onclick="app.navigate('register')">立即注册</a></div>
      </div>
    </div>

    <div id="page-register" class="page">
      <div class="register-page">
        <h2>注册账号</h2>
        <div class="form-group"><label>用户名</label><input type="text" id="reg-username"></div>
        <div class="form-group"><label>邮箱</label><input type="email" id="reg-email"></div>
        <div class="form-group"><label>密码</label><input type="password" id="reg-password"></div>
        <button class="btn-submit" onclick="app.handleRegister()">注册</button>
        <div class="form-footer">已有账号？ <a onclick="app.navigate('login')">立即登录</a></div>
      </div>
    </div>
  </main>

  <script>
    const API_BASE = window.location.origin === 'http://localhost:3001' ? 'http://localhost:8000/api' : '/api';
    let token = localStorage.getItem('token');
    let currentUser = null;
    let pageHistory = [];
    let currentPage = 'home';

    const api = {
      async request(path, options = {}) {
        const headers = { ...options.headers };
        if (token) headers['Authorization'] = `Bearer ${token}`;
        if (!options.body && options.method === 'POST') options.body = JSON.stringify({});
        if (options.body && typeof options.body === 'object') options.body = JSON.stringify(options.body);
        if (options.method === 'POST' || options.method === 'PATCH') headers['Content-Type'] = 'application/json';
        
        const res = await fetch(`${API_BASE}${path}`, { ...options, headers });
        if (res.status === 401) {
          token = null; localStorage.removeItem('token'); currentUser = null;
          app.updateAuthUI();
        }
        return res.json();
      },
      get: (path) => api.request(path, { method: 'GET' }),
      post: (path, body) => api.request(path, { method: 'POST', body }),
      patch: (path, body) => api.request(path, { method: 'PATCH', body }),
      del: (path) => api.request(path, { method: 'DELETE' })
    };

    function getDotClass(name) {
      const n = (name || '').toLowerCase();
      if (n.includes('nature')) return 'dot-nature';
      if (n.includes('science')) return 'dot-science';
      if (n.includes('cell')) return 'dot-cell';
      return 'dot-nature';
    }

    function renderPaperCard(paper) {
      const j = paper.journal || {};
      return `
        <div class="paper-card" onclick="app.openPaper(${paper.id})">
          <div class="card-header">
            <span class="journal-dot ${getDotClass(j.name)}"></span>
            <span class="journal-name">${j.name || 'Unknown'}</span>
            ${j.impact_factor ? `<span style="margin-left:auto;font-size:12px;color:#f59e0b">IF: ${j.impact_factor}</span>` : ''}
          </div>
          <h3 class="paper-title">${paper.title}</h3>
          <p class="paper-abstract">${paper.abstract ? paper.abstract.substring(0, 120) + '...' : ''}</p>
          <div class="paper-meta">
            <span class="paper-authors">${paper.authors || ''}</span>
            <div style="display:flex; gap:16px; align-items:center;">
              <span class="citation-count">📚 ${paper.citation_count || 0}</span>
              ${token ? `<button class="like-btn" onclick="event.stopPropagation(); app.likePaper(${paper.id})">👍 ${paper.like_count || 0}</button>` : ''}
            </div>
          </div>
        </div>`;
    }

    const MAX_HISTORY = 50;
    let navigatingFromHistory = false;

    const app = {
      async navigate(page, replace = false) {
        if (!navigatingFromHistory) {
          if (replace) {
            history.replaceState({ page: page }, '', '#' + page);
          } else {
            history.pushState({ page: page }, '', '#' + page);
          }
        }
        if (!replace && currentPage !== page && !['login', 'register'].includes(page)) {
          pageHistory.push(currentPage);
          if (pageHistory.length > MAX_HISTORY) {
            pageHistory.shift();
          }
        }
        currentPage = page;
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
        const pageEl = document.getElementById(`page-${page}`);
        if (pageEl) pageEl.classList.add('active');
        const navEl = document.querySelector(`a[onclick="app.navigate('${page}')"]`);
        if (navEl) navEl.classList.add('active');

        if (replace) return;
        if (page === 'home') this.renderHome();
        else if (page === 'papers') this.renderPapers();
        else if (page === 'explore') this.renderExplore();
        else if (page === 'profile') this.renderProfile();
        else if (page === 'bookmarks') this.renderBookmarks();
        else if (page === 'feed') this.renderFeed();
        else if (page === 'friends') this.renderFriends();
        else if (page === 'add-friend') this.renderAddFriend();
      },

      goBack() {
        history.back();
      },

      async renderHome() {
        const grid = document.getElementById('homeGrid');
        const countEl = document.getElementById('home-count');
        grid.innerHTML = '<div class="spinner"></div>';
        const data = await api.get('/papers/?page=1&page_size=6');
        countEl.textContent = `发现 ${data.total || 0} 篇前沿论文`;
        grid.innerHTML = (data.papers || []).map(renderPaperCard).join('') || '暂无论文';
      },

      async renderPapers() {
        const grid = document.getElementById('papersGrid');
        grid.innerHTML = '<div class="spinner"></div>';
        const data = await api.get('/papers/?page=1&page_size=50');
        grid.innerHTML = (data.papers || []).map(renderPaperCard).join('') || '暂无论文';
      },

      async openPaper(id) {
        this.navigate('paper-detail');
        const contentDiv = document.getElementById('paperDetail');
        contentDiv.innerHTML = '<div class="spinner"></div>';
        const paper = await api.get(`/papers/${id}`);
        const j = paper.journal || {};
        contentDiv.innerHTML = `
          <div class="paper-detail">
            <div class="card-header" style="margin-bottom:24px;">
              <span class="journal-dot ${getDotClass(j.name)}"></span>
              <span class="journal-name">${j.name || ''}</span>
              ${j.impact_factor ? `<span style="margin-left:auto;font-size:12px;color:#f59e0b">IF: ${j.impact_factor}</span>` : ''}
            </div>
            <h1>${paper.title}</h1>
            <p class="paper-abstract">${paper.abstract || '暂无摘要'}</p>
            <div class="paper-meta" style="display:flex; align-items:center; gap:8px; background:#f8fafc; padding:12px; border-radius:12px; margin:24px 0;">
              <span>📚 引用数: ${paper.citation_count || 0}</span>
            </div>
            <div style="display:flex; gap:12px; margin-top:24px;">
              <a href="https://doi.org/${paper.doi}" target="_blank" class="btn-read-detail">阅读原文</a>
              ${token ? `<button class="btn-read-detail" style="background:#3b82f6;" onclick="app.bookmarkPaper(${paper.id})">收藏</button>` : ''}
            </div>
          </div>
          <div class="citation-section">
            <h3>引文图谱</h3>
            <div id="citation-graph"></div>
          </div>`;
        this.renderCitationGraph(id);
      },

      async renderCitationGraph(paperId) {
        const container = document.getElementById('citation-graph');
        const data = await api.get(`/papers/${paperId}/citations`);
        if (!data.references && !data.cited_by) return;

        const nodes = [{ id: 0, name: '本文', group: 0, r: 12 }];
        const links = [];
        let nextId = 1;

        (data.references || []).forEach((ref, i) => {
          nodes.push({ id: nextId, name: ref.paper.title.substring(0, 20) + '...', group: 1, r: 8 + (ref.score * 5) });
          links.push({ source: 0, target: nextId });
          nextId++;
        });

        (data.cited_by || []).forEach((cit, i) => {
          nodes.push({ id: nextId, name: cit.paper.title.substring(0, 20) + '...', group: 2, r: 8 + (cit.score * 5) });
          links.push({ source: nextId, target: 0 });
          nextId++;
        });

        container.innerHTML = '<svg id="citation-svg"></svg>';
        const width = container.clientWidth || 600, height = 400;
        const svg = d3.select('#citation-svg').attr('width', width).attr('height', height);
        const simulation = d3.forceSimulation(nodes)
          .force('link', d3.forceLink(links).id(d => d.id).distance(100))
          .force('charge', d3.forceManyBody().strength(-200))
          .force('center', d3.forceCenter(width / 2, height / 2));

        svg.append('g').selectAll('line').data(links).join('line').attr('class', 'citation-link');
        svg.append('g').selectAll('circle').data(nodes).join('circle')
          .attr('r', d => d.r).attr('fill', d => ['#0f172a','#3b82f6','#8b5cf6'][d.group])
          .call(d3.drag().on('start', (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
            .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
            .on('end', (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }));
        
        svg.append('g').selectAll('text').data(nodes).join('text')
          .attr('class', 'citation-label').text(d => d.name).attr('dy', 20);

        simulation.on('tick', () => {
          svg.selectAll('line').attr('x1', d => d.source.x).attr('y1', d => d.source.y).attr('x2', d => d.target.x).attr('y2', d => d.target.y);
          svg.selectAll('circle').attr('cx', d => d.x).attr('cy', d => d.y);
          svg.selectAll('text').attr('x', d => d.x).attr('y', d => d.y);
        });
      },

      async renderExplore() {
        const el = document.getElementById('page-explore');
        el.innerHTML = `
          <div class="main-content">
            <div class="section-header"><h2>发现</h2></div>
            <div style="display:flex; gap:12px; max-width:600px; margin-bottom:2rem;">
              <input type="text" id="search-input" placeholder="搜索论文..." style="flex:1;padding:12px;border:1px solid #d1d5db;border-radius:8px;">
              <button class="btn-read" onclick="app.searchPapers()">搜索</button>
            </div>
            <div class="section-header"><h3>为你推荐</h3></div>
            <div class="paper-grid" id="trendingGrid"></div>
            <div id="search-results" style="display:none; margin-top:2rem;">
              <div class="section-header"><h3>搜索结果</h3></div>
              <div class="paper-grid" id="searchGrid"></div>
            </div>
          </div>`;
        const data = await api.get('/papers/recommendations/trending?limit=6');
        document.getElementById('trendingGrid').innerHTML = (data.papers || []).map(renderPaperCard).join('') || '暂无推荐';
        document.getElementById('search-input').addEventListener('keypress', e => e.key === 'Enter' && app.searchPapers());
      },

      async searchPapers() {
        const q = document.getElementById('search-input').value.trim();
        if (!q) return;
        document.getElementById('search-results').style.display = 'block';
        const grid = document.getElementById('searchGrid');
        grid.innerHTML = '<div class="spinner"></div>';
        const data = await api.get(`/papers/search?q=${encodeURIComponent(q)}`);
        grid.innerHTML = (data.papers || []).map(renderPaperCard).join('') || '未找到相关论文';
      },

      async renderFeed() {
        const container = document.getElementById('feed-container');
        container.innerHTML = '<div class="spinner"></div>';
        const posts = await api.get('/social/feed');
        if (!posts || posts.length === 0) {
          container.innerHTML = '<div class="empty-state" style="text-align:center;padding:3rem;"><h3>暂无动态</h3><p>关注更多学者来发现新知</p></div>';
          return;
        }
        container.innerHTML = posts.map(post => `
          <div class="feed-item">
            <div class="feed-user">
              <div class="user-avatar">${post.author?.username[0] || 'U'}</div>
              <div>
                <strong>${post.author?.username || '未知用户'}</strong>
                ${token && post.author?.id !== currentUser.id ? `<button class="btn-login" onclick="app.followUser(${post.author.id})" style="margin-left:12px;padding:4px 12px;font-size:12px;">关注</button>` : ''}
              </div>
            </div>
            <div class="feed-content">${post.content}</div>
            ${post.paper_id ? `
              <div class="feed-paper-card" onclick="app.openPaper(${post.paper_id})">
                <strong>关联论文: ${post.paper?.title || '加载中...'}</strong>
              </div>` : ''}
            <div style="display:flex; gap:20px; margin-top:12px;">
              <button class="like-btn" onclick="app.likePost(${post.id})">👍 ${post.like_count || 0}</button>
              <button class="like-btn" onclick="app.showCommentBox(${post.id})">💬 ${post.comment_count || 0}</button>
            </div>
            <div id="comment-box-${post.id}" style="display:none;margin-top:12px;">
              <input type="text" placeholder="发表评论..." style="width:100%;padding:10px;border:1px solid #e2e8f0;border-radius:8px;" id="comment-input-${post.id}">
              <button class="btn-read" onclick="app.addComment(${post.id})" style="margin-top:8px;padding:6px 16px;font-size:12px;">发送</button>
            </div>
          </div>`).join('');
      },

      async followUser(userId) {
        if (!currentUser) { alert('请先登录'); return; }
        const res = await api.post(`/social/follows/${userId}`);
        if (res.status === 'success') {
          alert(res.followed ? '关注成功！' : '取消关注成功！');
          this.renderFeed();
        } else {
          alert(res.detail || '操作失败');
        }
      },

      async likePost(postId) {
        if (!currentUser) { alert('请先登录'); return; }
        const res = await api.post('/social/likes', { entity_type: 'post', entity_id: postId });
        if (res.status === 'success') {
          this.renderFeed();
        }
      },

      showCommentBox(postId) {
        const box = document.getElementById(`comment-box-${postId}`);
        box.style.display = box.style.display === 'none' ? 'block' : 'none';
      },

      async addComment(postId) {
        if (!currentUser) { alert('请先登录'); return; }
        const content = document.getElementById(`comment-input-${postId}`).value.trim();
        if (!content) return;
        const res = await api.post(`/social/posts/${postId}/comments`, { content });
        if (res.id) {
          document.getElementById(`comment-input-${postId}`).value = '';
          this.renderFeed();
        }
      },

      async renderProfile() {
        if (!currentUser) { this.navigate('login'); return; }
        const header = document.getElementById('profile-header');
        const stats = document.getElementById('profile-stats');
        const profile = await api.get('/social/me/profile');
        header.innerHTML = `
          <div class="profile-header">
            <div class="profile-avatar">${currentUser.username[0].toUpperCase()}</div>
            <div>
              <h3>${currentUser.username}</h3>
              <p>${currentUser.email}</p>
            </div>
          </div>`;
        stats.innerHTML = `
          <div class="stat-card"><div class="stat-value">${profile.posts_count}</div><div class="stat-label">发布心得</div></div>
          <div class="stat-card"><div class="stat-value">${profile.bookmark_count}</div><div class="stat-label">收藏论文</div></div>
          <div class="stat-card"><div class="stat-value">${profile.follow_count}</div><div class="stat-label">关注中</div></div>
        `;
      },

      async renderBookmarks() {
        const grid = document.getElementById('bookmarksGrid');
        if (!currentUser) { this.navigate('login'); return; }
        grid.innerHTML = '<div class="spinner"></div>';
        const data = await api.get('/social/bookmarks'); // Simplified for demo
        grid.innerHTML = (data || []).map(b => renderPaperCard(b.paper)).join('') || '暂无收藏';
      },

      async bookmarkPaper(id) {
        if (!currentUser) { alert('请先登录'); this.navigate('login'); return; }
        const res = await api.post('/social/bookmarks', { paper_id: id, collection_name: 'default' });
        alert(res.bookmarked ? '收藏成功！' : '取消收藏成功！');
      },

      async likePaper(id) {
        if (!currentUser) { alert('请先登录'); this.navigate('login'); return; }
        const res = await api.post('/social/likes', { entity_type: 'paper', entity_id: id });
        if (res.status === 'success') {
          this.renderHome();
        } else {
          alert('操作失败');
        }
      },

      showPostModal() {
        document.getElementById('post-modal').style.display = 'flex';
      },

      hidePostModal() {
        document.getElementById('post-modal').style.display = 'none';
        document.getElementById('post-content').value = '';
        document.getElementById('post-paper-id').value = '';
      },

      async createPost() {
        const content = document.getElementById('post-content').value.trim();
        const paperId = parseInt(document.getElementById('post-paper-id').value) || null;
        if (!content) { alert('请输入心得内容'); return; }
        const res = await api.post('/social/posts', { content, paper_id: paperId, images: [] });
        if (res.id) {
          alert('发布成功！');
          this.hidePostModal();
          this.renderFeed();
        } else {
          alert('发布失败');
        }
      },

      async renderFriends() {
        if (!currentUser) { this.navigate('login'); return; }
        const container = document.getElementById('friends-history');
        container.innerHTML = '<div class="spinner"></div>';
        const history = await api.get('/social/friends/history');
        if (!history || history.length === 0) {
          container.innerHTML = '<div class="empty-state" style="text-align:center;padding:3rem;"><h3>暂无好友动态</h3><p>添加好友后可以看到他们的阅读记录</p></div>';
          return;
        }
        container.innerHTML = history.map(item => `
          <div class="feed-item">
            <div class="feed-user">
              <div class="user-avatar">${item.user?.username[0] || 'U'}</div>
              <div><strong>${item.user?.username || '未知用户'}</strong> 刚刚阅读了</div>
            </div>
            <div class="feed-paper-card" onclick="app.openPaper(${item.paper.id})">
              <strong>${item.paper.title}</strong>
            </div>
          </div>`).join('');
      },

      async renderAddFriend() {
        if (!currentUser) { this.navigate('login'); return; }
        const pending = document.getElementById('pending-requests');
        const requests = await api.get('/social/friend-requests');
        if (!requests || requests.length === 0) {
          pending.innerHTML = '<p style="color:#64748b;">暂无待处理请求</p>';
        } else {
          pending.innerHTML = requests.map(r => `
            <div class="feed-item" style="display:flex;justify-content:space-between;align-items:center;">
              <div class="feed-user">
                <div class="user-avatar">${r.requester?.username[0] || 'U'}</div>
                <div><strong>${r.requester?.username}</strong> 请求添加你为好友</div>
              </div>
              <div style="display:flex;gap:12px;">
                <button class="btn-read" onclick="app.acceptFriendRequest(${r.id})">接受</button>
                <button class="btn-login" onclick="app.rejectFriendRequest(${r.id})">拒绝</button>
              </div>
            </div>`).join('');
        }
      },

      async searchFriends() {
        const q = document.getElementById('friend-search').value.trim();
        if (!q) return;
        const results = document.getElementById('friend-search-results');
        results.innerHTML = '<div class="spinner"></div>';
        const users = await api.get(`/social/users/search?q=${encodeURIComponent(q)}`);
        if (!users || users.length === 0) {
          results.innerHTML = '<p style="color:#64748b;">未找到用户</p>';
        } else {
          results.innerHTML = users.map(u => `
            <div class="feed-item" style="display:flex;justify-content:space-between;align-items:center;">
              <div class="feed-user">
                <div class="user-avatar">${u.username[0]}</div>
                <div><strong>${u.username}</strong><br>${u.email}</div>
              </div>
              <button class="btn-read" onclick="app.sendFriendRequest(${u.id})">发送好友请求</button>
            </div>`).join('');
        }
      },

      async sendFriendRequest(userId) {
        const res = await api.post(`/social/friendships/${userId}`);
        if (res.id) {
          alert('好友请求已发送！');
          this.renderAddFriend();
        } else {
          alert(res.detail || '操作失败');
        }
      },

      async acceptFriendRequest(requestId) {
        const res = await api.post(`/social/friend-requests/${requestId}/accept`);
        if (res.status === 'success') {
          alert('已接受好友请求！');
          this.renderAddFriend();
        } else {
          alert('操作失败');
        }
      },

      async handleLogin() {
        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;
        const res = await api.post('/auth/login', { email, password });
        if (res.access_token) {
          token = res.access_token;
          localStorage.setItem('token', token);
          currentUser = await api.get('/auth/me');
          this.updateAuthUI();
          this.navigate('home');
        } else { alert(res.detail || '登录失败'); }
      },

      async handleRegister() {
        const username = document.getElementById('reg-username').value;
        const email = document.getElementById('reg-email').value;
        const password = document.getElementById('reg-password').value;
        const res = await api.post('/auth/register', { username, email, password });
        if (res.id) { alert('注册成功！'); this.navigate('login'); }
        else { alert(res.detail || '注册失败'); }
      },

      logout() {
        token = null; currentUser = null; localStorage.removeItem('token');
        this.updateAuthUI(); this.navigate('home');
      },

      updateAuthUI() {
        const authBtns = document.getElementById('auth-buttons');
        const userInfo = document.getElementById('user-info');
        const userName = document.getElementById('user-name');
        if (currentUser) {
          authBtns.style.display = 'none'; userInfo.style.display = 'flex';
          userName.textContent = currentUser.username;
        } else {
          authBtns.style.display = 'flex'; userInfo.style.display = 'none';
        }
      }
    };

    window.addEventListener('popstate', function (e) {
      const page = (e.state && e.state.page) || (location.hash && location.hash.slice(1)) || 'home';
      navigatingFromHistory = true;
      app.navigate(page, true);
      navigatingFromHistory = false;
    });

    document.addEventListener('DOMContentLoaded', async () => {
      if (token) {
        const me = await api.get('/auth/me');
        if (me.id) currentUser = me; else { token = null; localStorage.removeItem('token'); }
      }
      app.updateAuthUI();
      const startPage = location.hash ? location.hash.slice(1) : 'home';
      history.replaceState({ page: startPage }, '', '#' + startPage);
      app.navigate(startPage, true);
      app.renderHome();
      app.renderPapers();
      app.renderExplore();
    });
  </script>
</body>
</html>
